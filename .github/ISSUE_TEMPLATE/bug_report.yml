name: Bug report
description: Report a reproducible OmniFM bug or regression
title: "[Bug]: "
labels:
  - bug
  - needs-triage
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include concrete steps, logs, and the affected OmniFM area.

  - type: input
    id: area
    attributes:
      label: Affected area
      description: For example reconnect, voice status, dashboard, billing, CI, logging
      placeholder: reconnect / voice status / dashboard
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: List the exact steps needed to reproduce the issue
      placeholder: |
        1. Start /play in a voice channel
        2. Wait until reconnect happens
        3. Observe that ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Paste excerpts from bot.log, error.log, CI output, or add screenshots
      render: shell

  - type: input
    id: version
    attributes:
      label: OmniFM version or commit
      placeholder: e.g. a01737e or v3.0.0

  - type: textarea
    id: environment
    attributes:
      label: Environment details
      description: Host OS, Docker yes/no, Node version if local, Discord voice/stage context

