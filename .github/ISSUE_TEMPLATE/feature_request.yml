name: Feature request
description: Propose a new OmniFM feature or workflow improvement
title: "[Feature]: "
labels:
  - enhancement
  - needs-triage
body:
  - type: markdown
    attributes:
      value: |
        Use this template for product, workflow, dashboard, bot, or infrastructure improvements.

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What limitation or operational pain are you trying to solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior you want instead
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope and affected areas
      description: Mention bot runtime, dashboard, billing, CI, docs, update scripts, or infrastructure as relevant

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered

  - type: textarea
    id: extra
    attributes:
      label: Extra context
      description: Screenshots, mockups, references, rollout notes

