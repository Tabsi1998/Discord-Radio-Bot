name: ci

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  node:
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval \"db.adminCommand({ ping: 1 })\""
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      MONGO_URL: mongodb://127.0.0.1:27017/omnifm_ci
      DB_NAME: omnifm_ci
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Run root tests
        run: npm test

      - name: Mongo smoke test
        run: node --input-type=module -e "const db = await import('./src/lib/db.js'); await db.connect(); if (!db.getDb()) throw new Error('Mongo connection failed'); await db.close();"

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Build container
        run: docker build -t omnifm-ci .
