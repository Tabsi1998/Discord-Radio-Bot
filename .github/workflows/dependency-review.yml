name: dependency-review

on:
  pull_request:
    branches:
      - main
      - master

concurrency:
  group: dependency-review-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  review:
    name: dependency review
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Dependency review disabled
        run: |
          echo "::notice title=Dependency review disabled::This repository does not run actions/dependency-review-action on pull requests. For this private repo, use Dependabot alerts/security updates or enable GitHub Advanced Security if you want GitHub-native dependency review enforcement."
