x-omnifm-volumes: &omnifm_volumes
  - ./stations.json:/app/stations.json
  - ./premium.json:/app/premium.json
  - ./bot-state.json:/app/bot-state.json
  - ./custom-stations.json:/app/custom-stations.json
  - ./command-permissions.json:/app/command-permissions.json
  - ./guild-languages.json:/app/guild-languages.json
  - ./song-history.json:/app/song-history.json
  - ./dashboard.json:/app/dashboard.json
  - ./listening-stats.json:/app/listening-stats.json
  - ./scheduled-events.json:/app/scheduled-events.json
  - ./coupons.json:/app/coupons.json
  - ./discordbotlist.json:/app/discordbotlist.json
  - ./botsgg.json:/app/botsgg.json
  - ./topgg.json:/app/topgg.json
  - ./vote-events.json:/app/vote-events.json
  - ./logs:/app/logs
  - ./bot-state:/app/bot-state
  - ./song-history:/app/song-history

x-omnifm-worker-base: &omnifm_worker_base
  build: .
  init: true
  env_file:
    - .env
  command: ["node", "src/entrypoints/worker.js"]
  environment:
    - MONGO_URL=mongodb://mongodb:27017
    - DB_NAME=radio_bot
    - BOT_PROCESS_ROLE=worker
  volumes: *omnifm_volumes
  restart: unless-stopped
  depends_on:
    mongodb:
      condition: service_healthy

services:
  mongodb:
    image: mongo:7
    container_name: omnifm-mongodb
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    environment:
      - MONGO_INITDB_DATABASE=radio_bot

  omnifm:
    build: .
    container_name: omnifm
    init: true
    env_file:
      - .env
    command: ["node", "src/entrypoints/commander.js"]
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - DB_NAME=radio_bot
      - BOT_PROCESS_ROLE=commander
    ports:
      - "${WEB_PORT:-8081}:${WEB_INTERNAL_PORT:-8080}"
    volumes: *omnifm_volumes
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch(`http://127.0.0.1:${process.env.WEB_INTERNAL_PORT || 8080}/api/health`).then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    depends_on:
      mongodb:
        condition: service_healthy

  omnifm-worker-1:
    <<: *omnifm_worker_base
    profiles: ["worker-1"]
    container_name: omnifm-worker-1
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - DB_NAME=radio_bot
      - BOT_PROCESS_ROLE=worker
      - BOT_PROCESS_INDEX=1

